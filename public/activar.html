<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activar chapita — Honey App</title>
  <link rel="stylesheet" href="/variables.css" />
  <link rel="stylesheet" href="/honey-theme.css" />
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: var(--bg-dark-blue, #0f172a);
      color: #f8fafc;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
    }
    .logo { width: 72px; height: 72px; margin: 0 auto 1rem; }
    h1 { font-size: 1.35rem; margin: 0 0 0.75rem; color: var(--accent-yellow, #f59e0b); }
    p { margin: 0; line-height: 1.6; color: rgba(248, 250, 252, 0.85); }
    .serial { font-family: ui-monospace, monospace; font-weight: 700; color: #fbbf24; }
    .actions { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    a.btn {
      display: inline-block;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
    }
    a.btn-primary { background: var(--accent-yellow, #f59e0b); color: #0f172a; }
    a.btn-secondary { border: 1px solid rgba(255,255,255,0.2); color: #f8fafc; }
    .spinner {
      width: 36px; height: 36px; margin: 1rem auto 0;
      border: 3px solid rgba(245,158,11,0.25);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/honey-app-logo.png" alt="Honey App" class="logo" />
    <h1 id="title">Activando chapita</h1>
    <p id="message">Validando tu código…</p>
    <div class="spinner" id="spinner"></div>
    <div class="actions" id="actions" hidden></div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const serial = (params.get("serial") || "").trim().toUpperCase();
      const error = params.get("error");
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const spinner = document.getElementById("spinner");
      const actions = document.getElementById("actions");

      function showError(titleText, body, links) {
        title.textContent = titleText;
        message.innerHTML = body;
        spinner.hidden = true;
        actions.hidden = false;
        actions.innerHTML = links
          .map(function (l) {
            return '<a class="btn ' + l.className + '" href="' + l.href + '">' + l.label + "</a>";
          })
          .join("");
      }

      if (error === "invalid") {
        showError(
          "Código no válido",
          serial
            ? 'La chapita <span class="serial">' + serial + "</span> no existe en nuestro stock."
            : "El código escaneado no es válido.",
          [{ className: "btn-primary", href: "/", label: "Ir al inicio" }],
        );
        return;
      }

      if (error === "orphan") {
        showError(
          "Chapita sin mascota",
          'La chapita <span class="serial">' + serial + "</span> figura activada pero no tiene mascota vinculada. Contactá soporte.",
          [{ className: "btn-primary", href: "/", label: "Ir al inicio" }],
        );
        return;
      }

      if (error === "unavailable") {
        showError(
          "Estamos mejorando el servicio",
          serial
            ? 'No pudimos validar la chapita <span class="serial">' +
                serial +
                "</span> en este momento. Podés reintentar o continuar el registro si tu chapita es nueva."
            : "El servicio de chapitas no responde. Intentá de nuevo en unos minutos.",
          [
            {
              className: "btn-primary",
              href: "/activar?serial=" + encodeURIComponent(serial),
              label: "Reintentar",
            },
            {
              className: "btn-secondary",
              href:
                "/registro?serial=" +
                encodeURIComponent(serial) +
                "&modo=registro&offline=1",
              label: "Continuar al registro",
            },
          ],
        );
        return;
      }

      if (!serial) {
        showError(
          "Falta el código",
          "Escaneá la chapita Honey o abrí el enlace que viene impreso en la etiqueta.",
          [{ className: "btn-primary", href: "/", label: "Ir al inicio" }],
        );
        return;
      }

      fetch("/api/qr-stock/" + encodeURIComponent(serial))
        .then(function (res) {
          return res.json().then(function (data) {
            return { ok: res.ok, status: res.status, data: data };
          });
        })
        .then(function (result) {
          if (result.status === 503 || result.data.code === "STOCK_UNAVAILABLE") {
            if (result.data.softFallback && result.data.registroUrl) {
              window.location.replace(result.data.registroUrl);
              return;
            }
            showError(
              "Estamos mejorando el servicio",
              "No pudimos validar tu chapita ahora. Reintentá en unos minutos.",
              [
                {
                  className: "btn-primary",
                  href: "/activar?serial=" + encodeURIComponent(serial),
                  label: "Reintentar",
                },
                {
                  className: "btn-secondary",
                  href:
                    "/registro?serial=" +
                    encodeURIComponent(serial) +
                    "&modo=registro&offline=1",
                  label: "Continuar al registro",
                },
              ],
            );
            return;
          }

          if (!result.ok) {
            showError(
              "Código no válido",
              result.data.error || "No reconocemos esta chapita.",
              [{ className: "btn-primary", href: "/", label: "Ir al inicio" }],
            );
            return;
          }

          if (result.data.available) {
            window.location.replace(
              "/registro?serial=" + encodeURIComponent(serial) + "&modo=registro",
            );
            return;
          }

          if (result.data.petQrToken) {
            window.location.replace("/?token=" + encodeURIComponent(result.data.petQrToken));
            return;
          }

          showError(
            "Chapita sin mascota",
            'La chapita <span class="serial">' + serial + "</span> ya fue activada pero falta vincular la mascota.",
            [{ className: "btn-primary", href: "/", label: "Ir al inicio" }],
          );
        })
        .catch(function () {
          showError(
            "Estamos mejorando el servicio",
            "No pudimos validar la chapita. Revisá tu internet e intentá de nuevo.",
            [
              {
                className: "btn-primary",
                href: "/activar?serial=" + encodeURIComponent(serial),
                label: "Reintentar",
              },
              {
                className: "btn-secondary",
                href:
                  "/registro?serial=" +
                  encodeURIComponent(serial) +
                  "&modo=registro&offline=1",
                label: "Continuar al registro",
              },
            ],
          );
        });
    })();
  </script>
</body>
</html>
