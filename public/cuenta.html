<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey App — Crear cuenta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portal-shell">
        <header class="portal-header">
            <img src="/assets/logo.svg" alt="Honey App" class="logo" width="200" height="45" decoding="async">
            <span class="portal-badge">Portal del dueño</span>
            <h1 class="portal-title">Creá tu cuenta</h1>
            <p class="portal-subtitle">Después podrás registrar mascotas y descargar el QR para la imprenta</p>
        </header>

        <div id="statusBanner" class="status-banner hidden"></div>

        <section class="card portal-card card__body">
            <h2>Registrate</h2>
            <p class="form-hint" style="margin-bottom: 1rem;">Solo te pedimos lo esencial para empezar</p>

            <form id="form-register" class="form-stack">
                <div class="form-field">
                    <label class="form-label" for="reg-name">Tu nombre</label>
                    <input id="reg-name" class="form-input" type="text" required maxlength="80" autocomplete="name" placeholder="Ej: María García">
                </div>
                <div class="form-field">
                    <label class="form-label" for="reg-email">Email</label>
                    <input id="reg-email" class="form-input" type="email" required autocomplete="email" placeholder="tu@email.com">
                </div>
                <div class="form-field">
                    <label class="form-label" for="reg-password">Contraseña</label>
                    <input id="reg-password" class="form-input" type="password" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" id="btn-register" class="btn-primary">Crear cuenta</button>
            </form>

            <p class="portal-divider">
                ¿Ya tenés cuenta?
                <a href="/login">Iniciá sesión</a>
            </p>
        </section>

        <footer class="portal-footer">
            <a href="/">← Volver al escaneo vecinal</a>
            <p style="margin-top: 0.75rem;">Honey App · Comunidad que cuida mascotas 💙🐾</p>
        </footer>
    </div>

    <script>
        const STORAGE_KEY = "honey_owner_jwt";
        const EMAIL_KEY = "honey_owner_email";
        const NAME_KEY = "honey_owner_name";
        const $ = (id) => document.getElementById(id);

        function showBanner(message, type = "error") {
            const el = $("statusBanner");
            el.className = `status-banner status-banner--${type === "success" ? "success" : "info"}`;
            el.textContent = message;
            el.classList.remove("hidden");
        }

        if (sessionStorage.getItem(STORAGE_KEY)) {
            window.location.replace("/registro");
        }

        $("form-register").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = $("btn-register");
            btn.disabled = true;

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: $("reg-name").value.trim(),
                        email: $("reg-email").value.trim(),
                        password: $("reg-password").value,
                    }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || data.message || `Error ${res.status}`);

                sessionStorage.setItem(STORAGE_KEY, data.token);
                sessionStorage.setItem(EMAIL_KEY, $("reg-email").value.trim());
                if (data.user?.name) sessionStorage.setItem(NAME_KEY, data.user.name);
                window.location.href = "/registro";
            } catch (err) {
                showBanner(err.message || "No se pudo crear la cuenta", "error");
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
