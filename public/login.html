<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey App — Portal del Dueño</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portal-shell">
        <header class="portal-header">
            <img src="/assets/logo.svg" alt="Honey App" class="logo" width="200" height="45" decoding="async">
            <span class="portal-badge">Portal del dueño</span>
            <h1 class="portal-title">Gestioná tus mascotas</h1>
            <p class="portal-subtitle">Iniciá sesión para registrar chapitas QR y acceder a tu panel</p>
        </header>

        <div id="statusBanner" class="status-banner hidden"></div>

        <section class="card portal-card card__body">
            <h2>Iniciar sesión</h2>
            <p class="form-hint" style="margin-bottom: 1rem;">Usá tu cuenta de dueño para continuar</p>

            <form id="form-login" class="form-stack">
                <div class="form-field">
                    <label class="form-label" for="login-email">Email</label>
                    <input id="login-email" class="form-input" type="email" required autocomplete="email" placeholder="tu@email.com">
                </div>
                <div class="form-field">
                    <label class="form-label" for="login-password">Contraseña</label>
                    <input id="login-password" class="form-input" type="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" id="btn-login" class="btn-primary">Entrar al portal</button>
            </form>

            <p class="portal-divider">
                ¿No tenés cuenta?
                <a href="/cuenta.html">Creá una aquí</a>
            </p>
        </section>

        <footer class="portal-footer">
            <a href="/">← Volver al escaneo vecinal</a>
            <p style="margin-top: 0.75rem;">Honey App · Comunidad que cuida mascotas 💙🐾</p>
        </footer>
    </div>

    <script src="/js/owner-auth.js"></script>
    <script>
        const STORAGE_KEY = "honey_owner_jwt";
        const EMAIL_KEY = "honey_owner_email";
        const NAME_KEY = "honey_owner_name";
        const $ = (id) => document.getElementById(id);

        function showBanner(message, type = "error") {
            const el = $("statusBanner");
            el.className = `status-banner status-banner--${type === "success" ? "success" : type === "info" ? "info" : "error"}`;
            el.textContent = message;
            el.classList.remove("hidden");
        }

        redirectOwnerIfAuthenticated();

        $("form-login").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = $("btn-login");
            btn.disabled = true;

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: $("login-email").value.trim(),
                        password: $("login-password").value,
                    }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || data.message || `Error ${res.status}`);

                sessionStorage.setItem(STORAGE_KEY, data.token);
                sessionStorage.setItem(EMAIL_KEY, $("login-email").value.trim());
                if (data.user?.name) sessionStorage.setItem(NAME_KEY, data.user.name);

                const dest = await resolveOwnerDestination(data.token);
                window.location.href = dest;
            } catch (err) {
                showBanner(err.message || "No se pudo iniciar sesión", "error");
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
