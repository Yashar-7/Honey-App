<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey App — Crear cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/honey-theme.css">
</head>
<body class="bg-[#0f172a] text-slate-300 min-h-screen font-sans antialiased honey-app">
    <div class="max-w-lg mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#d97706] flex justify-center items-center gap-2">
                🐾 Honey App
            </h1>
            <p class="text-sm text-slate-400 mt-2">Creá tu cuenta de dueño</p>
        </header>

        <div id="statusBanner" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-medium border"></div>

        <section class="bg-[#1e293b] rounded-2xl p-6 shadow-xl border border-slate-700">
            <h2 class="text-lg font-semibold mb-1 text-[#f8fafc]">Registrate</h2>
            <p class="text-xs text-slate-500 mb-5">Después podrás registrar mascotas y descargar el QR para la imprenta.</p>

            <form id="form-register" class="space-y-4">
                <div>
                    <label for="reg-name" class="text-xs font-medium text-slate-400 block mb-1">Tu nombre</label>
                    <input id="reg-name" type="text" required maxlength="80" autocomplete="name"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500"
                        placeholder="Ej: María García">
                </div>
                <div>
                    <label for="reg-email" class="text-xs font-medium text-slate-400 block mb-1">Email</label>
                    <input id="reg-email" type="email" required autocomplete="email"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500"
                        placeholder="tu@email.com">
                </div>
                <div>
                    <label for="reg-password" class="text-xs font-medium text-slate-400 block mb-1">Contraseña</label>
                    <input id="reg-password" type="password" required minlength="6" autocomplete="new-password"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500"
                        placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" id="btn-register"
                    class="w-full bg-[#d97706] hover:bg-[#b45309] text-[#f8fafc] font-bold py-3 rounded-2xl transition shadow-lg">
                    Crear cuenta
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                ¿Ya tenés cuenta?
                <a href="/registro.html" class="text-amber-400 hover:text-amber-300 font-medium underline">
                    Iniciá sesión
                </a>
            </p>
        </section>

        <footer class="text-center text-xs text-slate-600 mt-8">
            Powered by Smart Tech · Sentinel Ecosystem
        </footer>
    </div>

    <script>
        const STORAGE_KEY = "honey_owner_jwt";
        const EMAIL_KEY = "honey_owner_email";
        const $ = (id) => document.getElementById(id);

        function showBanner(message, type = "error") {
            const el = $("statusBanner");
            el.textContent = message;
            el.classList.remove("hidden", "bg-red-900/60", "border-red-600", "text-red-200", "bg-emerald-900/60", "border-emerald-600", "text-emerald-200");
            el.classList.add(type === "success" ? "bg-emerald-900/60" : "bg-red-900/60", type === "success" ? "border-emerald-600" : "border-red-600", type === "success" ? "text-emerald-200" : "text-red-200", "border");
            el.classList.remove("hidden");
        }

        $("form-register").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = $("btn-register");
            btn.disabled = true;

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: $("reg-name").value.trim(),
                        email: $("reg-email").value.trim(),
                        password: $("reg-password").value,
                    }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

                sessionStorage.setItem(STORAGE_KEY, data.token);
                sessionStorage.setItem(EMAIL_KEY, data.user.email);
                showBanner("¡Cuenta creada! Redirigiendo…", "success");
                setTimeout(() => { window.location.href = "/registro.html"; }, 800);
            } catch (err) {
                showBanner(err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
